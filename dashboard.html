    <div class="grid md:grid-cols-2 gap-6">
        <!-- Keamanan -->
        <div class="card p-6">
            <h2 class="font-bold text-xl mb-4 text-green-600">🛡️ Fitur Keamanan</h2>
            <div class="space-y-2">
                <label class="flex items-center justify-between">

                <label class="flex items-center justify-between">

                <label class="flex items-center justify-between">

                <label class="flex items-center justify-between">

        <!-- Manajemen -->
        <div class="card p-6">
            <h2 class="font-bold text-xl mb-4 text-blue-600">👑 Fitur Manajemen</h2>
            <div class="space-y-2">
                <label class="flex items-center justify-between">
                    <span>Auto Welcome</span>

                <label class="flex items-center justify-between">

        <div class="card p-6">
            <h2 class="font-bold text-xl mb-4 text-yellow-600">🎮 Fitur Interaktif</h2>

                <button onclick="startQuiz()" class="w-full bg-purple-500 text-white py-2 rounded-lg">🎮 Mulai Quiz</button>

        <div class="card p-6">

                    <p class="font-semibold">Total Pesan Hari Ini</p>
                    <p id="todayMessages" class="text-2xl font-bold">0</p>
                </div>
                <div class="border-b pb-2">

                    <p id="totalSpamBlocked" class="text-2xl font-bold text-red-500">0</p>
                </div>
                <div class="border-b pb-2">

                    <p id="activeMembers" class="text-2xl font-bold text-green-500">0</p>

<script>
// Fungsi untuk fitur interaktif
async function startQuiz() {
    const groupId = prompt('Masukkan ID Grup:');
    if (!groupId) return;
    
    const response = await fetch('/api/bot/quiz/start', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        },
        body: JSON.stringify({ groupId })
    });
    const data = await response.json();
    if (data.success) {
        Swal.fire('Quiz Dimulai!', 'Anggota grup bisa menjawab dengan mengirim nomor jawaban', 'success');
    }
}

async function createPoll() {
    const groupId = prompt('Masukkan ID Grup:');
    if (!groupId) return;
    const question = prompt('Pertanyaan polling:');
    const options = prompt('Opsi (pisah dengan koma):').split(',');
    const duration = parseInt(prompt('Durasi (menit):', '5'));
    
    const response = await fetch('/api/bot/poll/create', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        },
        body: JSON.stringify({ groupId, question, options, duration })
    });
    const data = await response.json();
    if (data.success) {
        Swal.fire('Polling Dibuat!', 'Polling telah dikirim ke grup', 'success');
    }
}

async function getRanking() {
    const groupId = prompt('Masukkan ID Grup:');
    if (!groupId) return;
    const period = prompt('Periode (day/week/month):', 'day');
    
    const response = await fetch(`/api/bot/ranking/${groupId}?period=${period}`, {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    const data = await response.json();
    if (data.success) {
        Swal.fire({
            title: '🏆 Ranking Member',
            html: `<pre style="text-align:left">${data.ranking}</pre>`,
            width: '500px'
        });
    }
}

async function getSummary() {
    const groupId = prompt('Masukkan ID Grup:');
    if (!groupId) return;
    const messageCount = parseInt(prompt('Jumlah pesan yang diringkas:', '100'));
    
    const response = await fetch('/api/bot/summary', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        },
        body: JSON.stringify({ groupId, messageCount })
    });
    const data = await response.json();
    if (data.success) {
        Swal.fire({
            title: '📋 Ringkasan Chat',
            html: `<pre style="text-align:left; white-space:pre-wrap">${data.summary}</pre>`,
            width: '500px'
        });
    }
}

async function lockGroup() {
    const groupId = prompt('Masukkan ID Grup:');
    if (!groupId) return;
    const duration = parseInt(prompt('Durasi lock (menit):', '60'));
    
    const response = await fetch('/api/bot/lock', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        },
        body: JSON.stringify({ groupId, duration })
    });
    const data = await response.json();
    if (data.success) {
        Swal.fire('Grup Dikunci!', `Grup akan read-only selama ${duration} menit`, 'success');
    }
}

async function scheduleMessage() {
    const groupId = prompt('Masukkan ID Grup:');
    if (!groupId) return;
    const message = prompt('Pesan yang akan dikirim:');
    const time = prompt('Waktu (format: YYYY-MM-DD HH:MM:SS):');
    
    const response = await fetch('/api/bot/schedule', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
        },
        body: JSON.stringify({ groupId, message, time })
    });
    const data = await response.json();
    if (data.success) {
        Swal.fire('Pesan Dijadwalkan!', `Pesan akan dikirim pada ${time}`, 'success');
    }
}

async function exportLogs() {
    const response = await fetch('/api/bot/logs/export', {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
    });
    const data = await response.json();
    if (data.success) {
        // Download CSV
        const blob = new Blob([data.csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `wabot_logs_${new Date().toISOString()}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }
}
</script>
